name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: surrogate-app

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} -p surrogate-app

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p surrogate-app

      - name: Package Linux tarball
        shell: bash
        run: |
          ARCHIVE="${BINARY_NAME}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" "${BINARY_NAME}"
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  build-macos:
    name: Build macOS App (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin

      - name: Build CLI binary
        run: cargo build --release --target aarch64-apple-darwin -p surrogate-app

      - name: Package CLI tarball
        shell: bash
        run: |
          ARCHIVE="${BINARY_NAME}-aarch64-apple-darwin.tar.gz"
          cd target/aarch64-apple-darwin/release
          tar czf "../../../${ARCHIVE}" "${BINARY_NAME}"
          cd ../../..
          echo "CLI_ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Build and package macOS .app bundle
        shell: bash
        run: |
          chmod +x scripts/package-macos.sh
          ./scripts/package-macos.sh release --target aarch64-apple-darwin

      - name: Validate .app bundle contains correct binary
        shell: bash
        run: |
          BINARY="Surrogate.app/Contents/MacOS/Surrogate"
          if [ ! -f "$BINARY" ]; then
            echo "FATAL: $BINARY not found"
            exit 1
          fi
          # Verify the binary links against AppKit (surrogate-macos) not just libc (surrogate-app)
          if ! otool -L "$BINARY" 2>/dev/null | grep -q "AppKit"; then
            echo "FATAL: Binary does not link AppKit — likely surrogate-app, not surrogate-macos"
            exit 1
          fi
          echo "OK: Binary links AppKit (confirmed surrogate-macos)"
          zip -r "Surrogate-macOS-aarch64.zip" "Surrogate.app"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin-cli
          path: ${{ env.CLI_ARCHIVE }}

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin-zip
          path: Surrogate-macOS-aarch64.zip
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.zip' -exec cp {} release-assets/ \;
          find artifacts -name '*.dmg' -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
